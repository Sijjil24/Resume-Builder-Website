<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — ResumeForge</title>
  <link rel="stylesheet" href="../cssFile/globalStyles.css" />
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="nav-logo">ResumeForge</a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="dashboard.html" class="active">Dashboard</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
    <button class="dark-toggle" id="darkToggle">🌙</button>
  </nav>

  <section>
    <div class="dashboard-header">
      <div>
        <h1 class="section-title">My Dashboard</h1>
        <p class="section-sub" style="margin-bottom:0;">Manage and track all your resumes.</p>
      </div>
      <a href="services.html" class="btn btn-primary">+ New Resume</a>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-num">3</span>
        <span class="stat-label">Total Resumes</span>
      </div>
      <div class="stat-card">
        <span class="stat-num">2</span>
        <span class="stat-label">Published</span>
      </div>
      <div class="stat-card">
        <span class="stat-num">1</span>
        <span class="stat-label">Drafts</span>
      </div>
      <div class="stat-card">
        <span class="stat-num">47</span>
        <span class="stat-label">Profile Views</span>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Resume Name</th>
            <th>Template</th>
            <th>Last Edited</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="resumeBody">
          <!-- filled by JS -->
        </tbody>
      </table>
    </div>
  </section>

  <footer class="footer">
    <span>© 2025 <strong style="color:var(--clr-accent);">ResumeForge</strong>. All rights reserved.</span>
    <span><a href="contact.html">Help & Support</a></span>
  </footer>

  <script src="../jsFile/jsFunctions.js"></script>
</body>
</html>
