<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — ResumeForge</title>
  <link rel="stylesheet" href="../cssFile/globalStyles.css" />
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="nav-logo">ResumeForge</a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
    <button class="dark-toggle" id="darkToggle">🌙</button>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h2>Create Account ✨</h2>
      <p>Join thousands building standout resumes.</p>

      <form id="signupForm">
        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="fullname" placeholder="Sia Khan" required />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@email.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min. 8 characters" required />
        </div>
        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" name="confirm" placeholder="Repeat password" required />
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <div class="auth-link">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <footer class="footer">
    <span>© 2025 <strong class="footer-brand">ResumeForge</strong>. All rights reserved.</span>
  </footer>

  <script src="../jsFile/jsFunctions.js"></script>
</body>
</html>
